services:
  oip:
    build: .
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./reports:/app/reports
    command: ["python", "main.py", "schedule"]

  dashboard:
    build: .
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./reports:/app/reports
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "src/dashboard/app.py", "--server.address=0.0.0.0"]

